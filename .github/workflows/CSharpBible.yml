name: CSharpBible CI3

on:
  push:
    paths:
      - "CSharpBible/**"
  pull_request:
    paths:
      - "CSharpBible/**"

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CSharpBible
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Remove private projects
        run: |
          $solution = "CSharpBible.slnx"

          dotnet sln $solution list |
            Where-Object { $_ -match '\.(csproj|vbproj|fsproj)$' } |
            ForEach-Object {
              $project = $_.Trim()

              if (-not (Test-Path -LiteralPath $project)) {
                Write-Host "Removing missing/private project: $project"
                dotnet sln $solution remove "$project"
              }
            }

      - name: Restore
        run: dotnet restore CSharpBible.slnx -p:TargetFramework=net10.0-windows

      - name: Build
        run: dotnet build CSharpBible.slnx --configuration Release --no-restore -p:TargetFramework=net10.0-windows

      - name: Test
        run: dotnet test CSharpBible.slnx --configuration Release --no-build --verbosity normal -p:TargetFramework=net10.0-windows
